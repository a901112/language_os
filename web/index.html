<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kotoha</title>
    <link rel="stylesheet" href="/styles.css?v=coach-v3" />
    <link rel="stylesheet" href="/kotoha-polish.css?v=loading-map-1" />
  </head>
  <body>
    <div class="mode-switch" aria-label="Learning language">
      <button class="mode-button" type="button" data-mode="en" aria-pressed="false">英</button>
      <button class="mode-button active" type="button" data-mode="ja" aria-pressed="true">日</button>
    </div>
    <main class="home" id="home">
      <h1 class="brand">Kotoha</h1>
      <form class="search" id="lesson-form">
        <input id="sentence-input" type="text" autocomplete="off" autofocus placeholder="你在想甚麼呢?" aria-label="你在想甚麼呢?" />
      </form>
      <section class="game" id="game" aria-live="polite">
        <div class="game-toolbar">
          <div class="game-header" id="game-header"></div>
          <div class="toolbar-actions">
            <button class="learned-open" id="hide-learned" type="button" hidden>隱藏已學會</button>
            <button class="learned-open" id="learned-open" type="button" hidden>已學會 0</button>
          </div>
        </div>
        <div class="lesson-shell" id="lesson-shell" hidden>
          <section class="structure-panel" id="structure-panel"></section>
          <nav class="category-tabs" id="category-tabs" aria-label="分類"></nav>
          <div class="results-list" id="results-list"></div>
          <section class="practice-panel" id="practice-panel"></section>
        </div>
        <section class="learned-panel" id="learned-panel" hidden>
          <div class="learned-panel-head">
            <div>
              <h2>已學會</h2>
              <p id="learned-summary"></p>
            </div>
            <button class="icon-button" id="learned-close" type="button" aria-label="關閉">×</button>
          </div>
          <section class="about-kotoha" aria-label="About Kotoha">
            <h3>Kotoha</h3>
            <p>一句話，長出你的語言地圖。</p>
            <p>Kotoha turns what you want to say into a personal language map.</p>
            <p>Concept, product direction, and learning design by Jimmy Chou.</p>
            <p>A Fangster project.</p>
          </section>
          <div class="learned-actions">
            <button class="soft-button" id="learned-export" type="button">匯出記錄檔</button>
            <button class="soft-button" id="learned-import" type="button">匯入</button>
            <button class="soft-button danger" id="learned-clear" type="button">清空</button>
            <input id="learned-file" type="file" accept="application/json" hidden />
          </div>
          <div class="learned-list" id="learned-list"></div>
        </section>
      </section>
      <footer class="creator-credit">Concept &amp; Product Design by Jimmy Chou</footer>
    </main>
    <script src="/app.js?v=coach-v3"></script>
    <script src="/practice-fix.js?v=coach-v3e"></script>
    <script src="/kotoha-loading.js?v=loading-map-1"></script>
  </body>
</html>
